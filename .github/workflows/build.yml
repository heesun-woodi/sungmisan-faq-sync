name: Build & Publish FAQ

# 실행 시점: 매월 1일 자동 + Actions 탭의 "Run workflow" 수동 버튼
on:
  schedule:
    - cron: "0 0 1 * *" # 매월 1일 00:00 UTC (= 한국시간 매월 1일 오전 9시)
  workflow_dispatch: {} # 수동 실행 버튼 (필요할 때 즉시 반영)

# gh-pages 브랜치에 결과물을 push 하기 위한 권한
permissions:
  contents: write

concurrency:
  group: "faq-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Build faq.html from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
        run: npm run build

      # dist/ 결과물을 gh-pages 브랜치로 배포 (GitHub Pages가 이 브랜치를 서빙)
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
